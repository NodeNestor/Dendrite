services:
  searxng:
    image: searxng/searxng:latest
    container_name: dendrite-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - dendrite-net
    restart: unless-stopped

  hiveminddb:
    build:
      context: ./hiveminddb
      dockerfile: deploy/docker/Dockerfile
    container_name: dendrite-hiveminddb
    ports:
      - "8100:8100"
    volumes:
      - hivemind-data:/app/data
    environment:
      - HIVEMIND_LLM_PROVIDER=http://host.docker.internal:8000/v1
      - HIVEMIND_PORT=8100
    networks:
      - dendrite-net
    restart: unless-stopped

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: dendrite-orchestrator
    ports:
      - "8082:8080"
    env_file:
      - .env
    environment:
      - SEARXNG_URL=http://searxng:8080
      - HIVEMIND_URL=http://hiveminddb:8100
    volumes:
      - orchestrator-data:/app/data
    depends_on:
      - searxng
      - hiveminddb
    networks:
      - dendrite-net
    restart: unless-stopped

  vllm:
    build:
      context: ./vllm
      dockerfile: Dockerfile
    container_name: dendrite-vllm
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${GPU_DEVICE:-GPU-3ad3e2fe}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - FLASHINFER_DISABLE_VERSION_CHECK=1
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command: >
      --model ${BULK_MODEL:-Qwen/Qwen3.5-0.8B}
      --quantization ${BULK_QUANTIZATION:-fp8}
      --max-model-len ${BULK_MAX_MODEL_LEN:-262144}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.95}
      --kv-cache-dtype ${KV_CACHE_DTYPE:-fp8}
      --reasoning-parser qwen3
      --max-num-batched-tokens 2096
      --enable-prefix-caching
      --host 0.0.0.0
      --port 8000
    networks:
      - dendrite-net
    restart: unless-stopped

networks:
  dendrite-net:
    driver: bridge

volumes:
  hivemind-data:
  orchestrator-data:
